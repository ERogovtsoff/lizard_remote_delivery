<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>LIZARD · Панель управления</title>
<link rel="preconnect" href="https://nhnbprmyqqpwcofkaasi.supabase.co" crossorigin />
<link rel="stylesheet" href="./styles.css?v=1" />
</head>
<body>

<!-- ЭКРАН ВХОДА -->
<div id="login" class="login-screen" style="display:none">
  <div class="login-card">
    <div class="login-logo">LIZARD</div>
    <div class="login-sub">Панель управления</div>
    <label class="login-label">Ваш Telegram username</label>
    <div class="login-input-wrap">
      <span class="login-at">@</span>
      <input type="text" id="loginUsername" placeholder="username" autocomplete="off" autocapitalize="off" spellcheck="false" />
    </div>
    <button class="login-btn" id="loginBtn">Войти</button>
    <div class="login-error" id="loginError"></div>
    <div class="login-hint">Доступ только для менеджеров магазина.</div>
  </div>
</div>

<!-- ОСНОВНОЕ ПРИЛОЖЕНИЕ -->
<div id="app" class="app" style="display:none">
  <!-- Боковая панель -->
  <aside class="sidebar">
    <div class="sidebar-head">
      <div class="brand">LIZARD</div>
      <div class="brand-sub">Чаты</div>
    </div>
    <div class="chat-list" id="chatList"></div>
    <div class="sidebar-foot">
      <span class="manager-name" id="managerName"></span>
      <button class="logout-btn" id="logoutBtn" title="Выйти">Выйти</button>
    </div>
  </aside>

  <!-- Область переписки -->
  <main class="main">
    <div class="chat-empty" id="chatEmpty">
      <div class="chat-empty-icon">💬</div>
      <div class="chat-empty-text">Выберите чат слева, чтобы посмотреть переписку</div>
    </div>

    <div class="chat-view" id="chatView" style="display:none">
      <header class="chat-header">
        <div class="chat-header-avatar" id="chatHeaderAvatar"></div>
        <div class="chat-header-info">
          <div class="chat-header-name" id="chatHeaderName"></div>
          <div class="chat-header-id" id="chatHeaderId"></div>
        </div>
      </header>
      <div class="messages" id="messages"></div>
      <!-- Поле ответа появится на Шаге 3 -->
      <div class="composer-placeholder">
        Ответы из панели появятся в следующем обновлении. Пока отвечайте через бота — вся переписка отображается здесь.
      </div>
    </div>
  </main>
</div>

<script type="module" src="./js/app.js"></script>
</body>
</html>
