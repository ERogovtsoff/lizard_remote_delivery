<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>LIZARD · Панель управления</title>
<link rel="preconnect" href="https://nhnbprmyqqpwcofkaasi.supabase.co" crossorigin />
<link rel="stylesheet" href="styles.css?v=17" />
</head>
<body>

<!-- ЭКРАН ВХОДА -->
<div id="login" class="login-screen" style="display:none">
  <div class="login-card">
    <div class="login-logo">LIZARD</div>
    <div class="login-sub">Панель управления</div>
    <label class="login-label">Ваш Telegram username</label>
    <div class="login-input-wrap">
      <span class="login-at">@</span>
      <input type="text" id="loginUsername" placeholder="username" autocomplete="off" autocapitalize="off" spellcheck="false" />
    </div>
    <button class="login-btn" id="loginBtn">Войти</button>
    <div class="login-error" id="loginError"></div>
    <div class="login-hint">Доступ только для менеджеров магазина.</div>
  </div>
</div>

<!-- ОСНОВНОЕ ПРИЛОЖЕНИЕ -->
<div id="app" class="app" style="display:none">
  <!-- Боковая панель -->
  <aside class="sidebar">
    <div class="sidebar-head">
      <div class="brand">LIZARD</div>
      <div class="nav-tabs">
        <button class="nav-tab active" data-section="orders">Заказы</button>
        <button class="nav-tab" data-section="catalog">Каталог</button>
      </div>
    </div>
    <div class="orders-side" id="ordersSide">
      <div class="orders-list" id="ordersList"></div>
    </div>
    <div class="catalog-side" id="catalogSide" style="display:none">
      <button class="catalog-add-btn" id="catalogAddBtn">+ Добавить товар</button>
      <input type="text" class="catalog-search" id="catalogSearch" placeholder="Поиск по названию или ID…" />
      <div class="catalog-side-list" id="catalogSideList"></div>
    </div>
    <div class="sidebar-foot">
      <span class="manager-name" id="managerName"></span>
      <div class="foot-actions">
        <button class="foot-btn" id="requisitesBtn" title="Реквизиты для оплаты">💳 Реквизиты</button>
        <button class="foot-btn" id="templatesBtn" title="Шаблоны ответов">📝 Шаблоны</button>
        <button class="logout-btn" id="logoutBtn" title="Выйти">Выйти</button>
      </div>
    </div>
  </aside>

  <!-- Главная область -->
  <main class="main">
    <!-- РАЗДЕЛ КАТАЛОГ -->
    <div class="section-catalog" id="sectionCatalog" style="display:none">
      <div class="catalog-empty" id="catalogEditorEmpty">
        <div class="chat-empty-icon">📦</div>
        <div class="chat-empty-text">Выберите товар слева или добавьте новый</div>
      </div>
      <div class="catalog-editor" id="catalogEditor" style="display:none"></div>
    </div>

    <!-- РАЗДЕЛ ЗАКАЗЫ -->
    <div class="section-orders" id="sectionOrders">
      <div class="catalog-empty" id="orderDetailEmpty">
        <div class="chat-empty-icon">🧾</div>
        <div class="chat-empty-text">Выберите заказ или обращение слева</div>
      </div>
      <div class="order-detail" id="orderDetail" style="display:none"></div>
    </div>
  </main>
</div>

<script type="module" src="./js/app.js"></script>
</body>
</html>
