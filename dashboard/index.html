<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>LIZARD · Панель управления</title>
<link rel="preconnect" href="https://nhnbprmyqqpwcofkaasi.supabase.co" crossorigin />
<link rel="stylesheet" href="styles.css?v=26" />
</head>
<body>

<!-- ЭКРАН ВХОДА -->
<div id="login" class="login-screen" style="display:none">
  <div class="login-card">
    <div class="login-logo">LIZARD</div>
    <div class="login-sub">Панель управления</div>
    <label class="login-label">Ваш Telegram username</label>
    <div class="login-input-wrap">
      <span class="login-at">@</span>
      <input type="text" id="loginUsername" placeholder="username" autocomplete="off" autocapitalize="off" spellcheck="false" />
    </div>
    <button class="login-btn" id="loginBtn">Войти</button>
    <div class="login-error" id="loginError"></div>
    <div class="login-hint">Доступ только для менеджеров магазина.</div>
  </div>
</div>

<!-- ОСНОВНОЕ ПРИЛОЖЕНИЕ -->
<div id="app" class="app" style="display:none">

  <!-- МОБИЛЬНЫЙ ХЕДЕР: одна шапка с навигацией для всех разделов.
       Виден только на ≤760px. На десктопе скрыт через CSS. -->
  <header class="mobile-topbar">
    <button class="mobile-menu-btn" id="mobileMenuBtn" aria-label="Меню">☰</button>
    <div class="mobile-nav-tabs">
      <button class="mobile-nav-tab active" data-section="orders">Заказы</button>
      <button class="mobile-nav-tab" data-section="customers">Клиенты</button>
      <button class="mobile-nav-tab" data-section="analytics">Аналитика</button>
      <button class="mobile-nav-tab" data-section="catalog">Каталог</button>
    </div>
    <button class="mobile-search-btn" id="mobileSearchBtn" aria-label="Поиск">🔍</button>
  </header>

  <!-- DRAWER: выезжающее меню для мобилки. Скрыто на десктопе. -->
  <div class="mobile-drawer" id="mobileDrawer">
    <div class="mobile-drawer-backdrop" id="mobileDrawerBackdrop"></div>
    <aside class="mobile-drawer-panel">
      <div class="mobile-drawer-head">
        <div class="brand">LIZARD</div>
        <button class="mobile-drawer-close" id="mobileDrawerClose" aria-label="Закрыть">✕</button>
      </div>
      <div class="mobile-drawer-user">
        <span class="manager-name" id="managerNameMobile"></span>
      </div>
      <button class="duty-toggle" id="dutyBtnMobile" title="Дежурство">⚪ Загрузка…</button>
      <div class="mobile-drawer-menu">
        <button class="drawer-item" data-action="requisites"><span class="drawer-ic">💳</span><span>Реквизиты</span></button>
        <button class="drawer-item" data-action="templates"><span class="drawer-ic">📝</span><span>Шаблоны</span></button>
        <button class="drawer-item" data-action="managers" id="drawerManagers" style="display:none"><span class="drawer-ic">👥</span><span>Менеджеры</span></button>
        <button class="drawer-item" data-action="audit"><span class="drawer-ic">📋</span><span>Журнал действий</span></button>
        <button class="drawer-item" data-action="theme"><span class="drawer-ic" id="drawerThemeIc">🌙</span><span id="drawerThemeLbl">Тёмная тема</span></button>
        <button class="drawer-item drawer-item-danger" data-action="logout"><span class="drawer-ic">🚪</span><span>Выйти</span></button>
      </div>
    </aside>
  </div>

  <!-- Боковая панель -->
  <aside class="sidebar">
    <div class="sidebar-head">
      <div class="brand">LIZARD</div>
      <div class="nav-tabs">
        <button class="nav-tab active" data-section="orders">Заказы</button>
        <button class="nav-tab" data-section="customers">Клиенты</button>
        <button class="nav-tab" data-section="analytics">Аналитика</button>
        <button class="nav-tab" data-section="catalog">Каталог</button>
      </div>
      <button class="global-search-btn" id="globalSearchBtn" title="Глобальный поиск (Ctrl+K)">🔍</button>
    </div>
    <div class="orders-side" id="ordersSide">
      <div class="orders-list" id="ordersList"></div>
    </div>
    <div class="catalog-side" id="catalogSide" style="display:none">
      <button class="catalog-add-btn" id="catalogAddBtn">+ Добавить товар</button>
      <input type="text" class="catalog-search" id="catalogSearch" placeholder="Поиск по названию или ID…" />
      <div class="catalog-side-list" id="catalogSideList"></div>
    </div>
    <div class="sidebar-foot">
      <span class="manager-name" id="managerName"></span>
      <button class="duty-toggle" id="dutyBtn" title="Дежурство — получать ли уведомления в Telegram-боте">⚪ Загрузка…</button>
      <div class="foot-actions">
        <button class="foot-btn" id="requisitesBtn" title="Реквизиты для оплаты">💳 Реквизиты</button>
        <button class="foot-btn" id="templatesBtn" title="Шаблоны ответов">📝 Шаблоны</button>
        <button class="foot-btn" id="managersBtn" title="Управление менеджерами" style="display:none">👥 Менеджеры</button>
        <button class="foot-btn" id="auditBtn" title="Журнал действий">📋 Журнал</button>
        <button class="foot-btn" id="themeBtn" title="Переключить тему">🌙</button>
        <button class="logout-btn" id="logoutBtn" title="Выйти">Выйти</button>
      </div>
    </div>
  </aside>

  <!-- Главная область -->
  <main class="main">
    <!-- РАЗДЕЛ КАТАЛОГ -->
    <div class="section-catalog" id="sectionCatalog" style="display:none">
      <div class="catalog-empty" id="catalogEditorEmpty">
        <div class="chat-empty-icon">📦</div>
        <div class="chat-empty-text">Выберите товар слева или добавьте новый</div>
      </div>
      <div class="catalog-editor" id="catalogEditor" style="display:none"></div>
    </div>

    <!-- РАЗДЕЛ ЗАКАЗЫ -->
    <div class="section-orders" id="sectionOrders">
      <div class="catalog-empty" id="orderDetailEmpty">
        <div class="chat-empty-icon">🧾</div>
        <div class="chat-empty-text">Выберите заказ или обращение слева</div>
      </div>
      <div class="order-detail" id="orderDetail" style="display:none"></div>
    </div>

    <!-- РАЗДЕЛ КЛИЕНТЫ -->
    <div class="section-customers" id="sectionCustomers" style="display:none"></div>

    <!-- РАЗДЕЛ АНАЛИТИКА -->
    <div class="section-analytics" id="sectionAnalytics" style="display:none"></div>
  </main>
</div>

<script type="module" src="./js/app.js"></script>
</body>
</html>
